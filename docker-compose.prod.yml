services:
  web:
    build: .
    container_name: strategy_platform_web
    network_mode: host
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:123456@localhost:5432/strategy_platform}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg2://postgres:123456@localhost:5432/strategy_platform}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/0}
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"

  celery-worker:
    build: .
    container_name: strategy_platform_worker
    network_mode: host
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:123456@localhost:5432/strategy_platform}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg2://postgres:123456@localhost:5432/strategy_platform}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/0}
    restart: unless-stopped
    command: >
      celery -A src.workers.celery_app:celery_app worker
      --loglevel=info
      --concurrency=1
      -Q backtest,signal

  celery-beat:
    build: .
    container_name: strategy_platform_beat
    network_mode: host
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:123456@localhost:5432/strategy_platform}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg2://postgres:123456@localhost:5432/strategy_platform}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/0}
    restart: unless-stopped
    command: >
      celery -A src.workers.celery_app:celery_app beat
      --loglevel=info
