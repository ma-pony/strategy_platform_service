name: Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to Aliyun Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/opt/strategy-platform-service"
            cd $DEPLOY_DIR

            echo ">>> 拉取最新代码..."
            git pull origin main

            echo ">>> 重新构建 Docker 镜像..."
            docker compose -f docker-compose.prod.yml build

            echo ">>> 执行数据库迁移（在新镜像上一次性运行，失败则终止部署）..."
            docker compose -f docker-compose.prod.yml run --rm --no-deps --entrypoint "" web alembic upgrade head

            echo ">>> 重启应用服务..."
            docker compose -f docker-compose.prod.yml up -d

            echo ">>> 等待服务启动..."
            sleep 10

            echo ">>> 检查服务状态..."
            docker compose -f docker-compose.prod.yml ps

            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo ">>> 健康检查..."
            sleep 5
            curl -f http://localhost:8000/api/v1/health || echo "⚠️ 健康检查失败"

            echo "✅ 部署完成！"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy succeeded"
          else
            echo "❌ Deploy failed"
          fi
